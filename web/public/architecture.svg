  <text x="70" y="365" fill="#c084fc" font-size="11" font-weight="600" letter-spacing="2">LAYER 2 — USER PLUGINS</text>

  <rect x="70" y="375" width="160" height="25" rx="4" fill="#a855f7" opacity="0.1"/>
  <text x="78" y="391" fill="#c084fc" font-size="11">Python BridgePlugin</text>
  <rect x="250" y="375" width="160" height="25" rx="4" fill="#a855f7" opacity="0.1"/>
  <text x="258" y="391" fill="#c084fc" font-size="11">JS BridgePlugin</text>
  <rect x="430" y="375" width="160" height="25" rx="4" fill="#a855f7" opacity="0.1"/>
  <text x="438" y="391" fill="#c084fc" font-size="11">Community Plugins</text>
  <rect x="610" y="375" width="215" height="25" rx="4" fill="#a855f7" opacity="0.1"/>
  <text x="618" y="391" fill="#c084fc" font-size="11">manifest.json + WASM</text>

  <!-- Arrow L2 -> L1 -->
  <line x1="450" y1="408" x2="450" y2="429" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>

