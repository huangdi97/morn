  <rect x="50" y="433" width="800" height="82" rx="8" fill="#0c1929" stroke="#2dd4bf" stroke-width="1" opacity="0.7"/>
  <text x="70" y="452" fill="#2dd4bf" font-size="11" font-weight="600" letter-spacing="2">LAYER 1 — ATOMIC COMPONENTS</text>

  <rect x="70" y="464" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="78" y="479" fill="#5eead4" font-size="10">Tool</text>

  <rect x="197" y="464" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="205" y="479" fill="#5eead4" font-size="10">Knowledge</text>

  <rect x="324" y="464" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="332" y="479" fill="#5eead4" font-size="10">Skill</text>

  <rect x="451" y="464" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="459" y="479" fill="#5eead4" font-size="10">Persona</text>

  <rect x="578" y="464" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="586" y="479" fill="#5eead4" font-size="10">Memory</text>

  <rect x="705" y="464" width="120" height="22" rx="4" fill="#14b8a6" opacity="0.1"/>
  <text x="713" y="479" fill="#5eead4" font-size="10">Model</text>

  <!-- Assembly arrows: components -> Agent -->
  <line x1="140" y1="486" x2="140" y2="505" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="450" y1="486" x2="450" y2="505" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Agent assembly -->
  <rect x="115" y="498" width="250" height="28" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1" filter="url(#glow)"/>
  <text x="145" y="517" fill="#38bdf8" font-size="12" font-weight="600">Agent  (component assembly)</text>

  <!-- Multi-Agent Team -->
  <rect x="440" y="498" width="385" height="28" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1" filter="url(#glow)"/>
  <text x="475" y="517" fill="#38bdf8" font-size="12" font-weight="600">Multi-Agent Team  (7 collaboration modes)</text>

  <!-- Line from Agent to Multi-Agent -->
  <line x1="365" y1="512" x2="440" y2="512" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Workflow assembly -->
  <rect x="280" y="535" width="340" height="28" rx="6" fill="#0ea5e9" opacity="0.2" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="330" y="554" fill="#7dd3fc" font-size="12" font-weight="700">Workflow  (NL → DAG orchestration)</text>

  <line x1="240" y1="526" x2="280" y2="549" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="635" y1="526" x2="620" y2="549" stroke="#64748b" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- ==================== UI Layer (web) ==================== -->
  <rect x="50" y="580" width="800" height="48" rx="8" fill="#0c1929" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="70" y="599" fill="#64748b" font-size="10" font-weight="600" letter-spacing="2">UI LAYER — React 18 + TypeScript + Vite 5</text>
  <rect x="70" y="607" width="120" height="16" rx="3" fill="#1e293b"/>
  <text x="76" y="619" fill="#94a3b8" font-size="9">Workbench</text>
  <rect x="200" y="607" width="120" height="16" rx="3" fill="#1e293b"/>
  <text x="206" y="619" fill="#94a3b8" font-size="9">Studio</text>
  <rect x="330" y="607" width="120" height="16" rx="3" fill="#1e293b"/>
  <text x="336" y="619" fill="#94a3b8" font-size="9">Store</text>
  <rect x="460" y="607" width="120" height="16" rx="3" fill="#1e293b"/>
  <text x="466" y="619" fill="#94a3b8" font-size="9">Console</text>
  <rect x="590" y="607" width="120" height="16" rx="3" fill="#1e293b"/>
  <text x="596" y="619" fill="#94a3b8" font-size="9">Settings</text>

  <!-- Dashed line separating UI layer from layers above -->
  <line x1="60" y1="574" x2="840" y2="574" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- ==================== Notes ==================== -->
  <text x="70" y="665" fill="#475569" font-size="9">27 morn:* plugins: agent, chat, memory, studio, store, console, security, tool, knowledge, model, workflow, hub, logger, config,</text>
  <text x="70" y="678" fill="#475569" font-size="9">notification, scheduler, template, auth, analytics, cache, export, import, search, sync, transform, validator, webhook, cron</text>
</svg>