  <text x="70" y="258" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="2">LAYER 3 — SYSTEM COMPONENTS (27 morn:* plugins)</text>

  <rect x="70" y="270" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="76" y="285" fill="#2dd4bf" font-size="10">morn:agent</text>
  <rect x="195" y="270" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="201" y="285" fill="#2dd4bf" font-size="10">morn:chat</text>
  <rect x="320" y="270" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="326" y="285" fill="#2dd4bf" font-size="10">morn:memory</text>
  <rect x="445" y="270" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="451" y="285" fill="#2dd4bf" font-size="10">morn:studio</text>
  <rect x="570" y="270" width="115" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="576" y="285" fill="#2dd4bf" font-size="10">morn:store</text>
  <rect x="695" y="270" width="130" height="22" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="701" y="285" fill="#2dd4bf" font-size="10">morn:console</text>

  <rect x="70" y="296" width="115" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="76" y="310" fill="#2dd4bf" font-size="10">morn:security</text>
  <rect x="195" y="296" width="115" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="201" y="310" fill="#2dd4bf" font-size="10">morn:tool</text>
  <rect x="320" y="296" width="115" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="326" y="310" fill="#2dd4bf" font-size="10">morn:knowledge</text>
  <rect x="445" y="296" width="115" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="451" y="310" fill="#2dd4bf" font-size="10">morn:model</text>
  <rect x="570" y="296" width="115" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="576" y="310" fill="#2dd4bf" font-size="10">morn:workflow</text>
  <rect x="695" y="296" width="130" height="20" rx="4" fill="#14b8a6" opacity="0.12"/>
  <text x="701" y="310" fill="#2dd4bf" font-size="10">+21 more morn:*</text>

