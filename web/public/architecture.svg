<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Morn Architecture</text>
  <text x="450" y="54" text-anchor="middle" fill="#64748b" font-size="12">Desktop AI OS — 5-Layer Architecture</text>

  <!-- ==================== Layer 5: Bootstrap ==================== -->
  <rect x="50" y="75" width="800" height="52" rx="8" fill="#0c1929" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,2" opacity="0.8"/>
  <text x="70" y="94" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="2">LAYER 5 — BOOTSTRAP</text>
  <rect x="70" y="103" width="100" height="20" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="78" y="117" fill="#38bdf8" font-size="11">Tauri Entry</text>
  <rect x="190" y="103" width="100" height="20" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="198" y="117" fill="#38bdf8" font-size="11">main.rs</text>
  <rect x="310" y="103" width="110" height="20" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="318" y="117" fill="#38bdf8" font-size="11">PluginLoader</text>
  <rect x="440" y="103" width="120" height="20" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="448" y="117" fill="#38bdf8" font-size="11">Vite Dev Server</text>
  <rect x="580" y="103" width="100" height="20" rx="4" fill="#0ea5e9" opacity="0.15"/>
  <text x="588" y="117" fill="#38bdf8" font-size="11">NSIS/MSI</text>

  <!-- Arrow L5 -> L4 -->
  <line x1="450" y1="127" x2="450" y2="148" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Layer 4: Kernel Core ==================== -->
  <rect x="50" y="152" width="800" height="62" rx="8" fill="#0c1929" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
  <text x="70" y="171" fill="#38bdf8" font-size="11" font-weight="600" letter-spacing="2">LAYER 4 — KERNEL CORE</text>
  <rect x="70" y="181" width="135" height="25" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <text x="78" y="197" fill="#0ea5e9" font-size="11">Supervisor</text>
  <rect x="220" y="181" width="135" height="25" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <text x="228" y="197" fill="#0ea5e9" font-size="11">PluginManager</text>
  <rect x="370" y="181" width="135" height="25" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <text x="378" y="197" fill="#0ea5e9" font-size="11">DataLayer</text>
  <rect x="520" y="181" width="135" height="25" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <text x="528" y="197" fill="#0ea5e9" font-size="11">EventBus</text>
