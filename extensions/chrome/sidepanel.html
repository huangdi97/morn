<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; background: #0d1117; color: #e6edf3; height: 100vh; margin: 0; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; }
    .msg { margin: 8px 0; padding: 8px 12px; border-radius: 8px; max-width: 85%; line-height: 1.45; white-space: pre-wrap; overflow-wrap: anywhere; }
    .user { background: #1f6feb; align-self: flex-end; margin-left: auto; }
    .assistant { background: #161b22; align-self: flex-start; }
    #input-bar { display: flex; padding: 12px; border-top: 1px solid #30363d; }
    #input-bar input { flex: 1; min-width: 0; padding: 8px; border: 1px solid #30363d; border-radius: 4px; background: #161b22; color: #e6edf3; }
    #input-bar button { margin-left: 8px; padding: 8px 16px; background: #1f6feb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #input-bar button:disabled { cursor: default; opacity: 0.65; }
    .context-badge { font-size: 11px; color: #8b949e; padding: 4px 8px; background: #21262d; border-radius: 4px; margin-bottom: 8px; overflow-wrap: anywhere; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="chat-input" placeholder="Ask about this page..." />
    <button id="send-btn">Send</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
