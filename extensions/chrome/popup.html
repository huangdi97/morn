<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morn AI Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🌅</span>
        <h1>Morn</h1>
      </div>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting...</span>
      </div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Toggle Section -->
      <div class="toggle-section">
        <div class="toggle-row">
          <span class="toggle-label">Enable on this page</span>
          <label class="switch">
            <input type="checkbox" id="toggleMorn" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <!-- Page Info Section -->
      <div class="section">
        <h2 class="section-title">Current Page</h2>
        <div class="page-info">
          <div class="info-row">
            <span class="info-label">Title:</span>
            <span class="info-value" id="pageTitle">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">URL:</span>
            <span class="info-value url" id="pageUrl">-</span>
          </div>
        </div>
      </div>

      <!-- Connection Info Section -->
      <div class="section">
        <h2 class="section-title">Connection</h2>
        <div class="connection-info">
          <div class="info-row">
            <span class="info-label">Server:</span>
            <span class="info-value" id="serverAddress">ws://localhost:9876</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status:</span>
            <span class="info-value" id="detailedStatus">Disconnected</span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-secondary" id="reconnectBtn">Reconnect</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Morn AI Assistant v1.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
