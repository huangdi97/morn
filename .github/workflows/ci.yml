name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Ubuntu: 构建 + 测试 + 格式检查
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Check formatting
        run: cargo fmt --check

  # Windows: Tauri 桌面构建 + NSIS 安装包
  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        run: npm run build
        working-directory: ./web

      - name: Build Tauri desktop app + NSIS
        run: cargo tauri build --bundles nsis,msi
        working-directory: ./src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: morn-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: morn-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/release/bundle/nsis/Morn_${{ replace(github.ref_name, 'v', '') }}_x64-setup.exe
          asset_name: Morn_${{ replace(github.ref_name, 'v', '') }}_x64-setup.exe
          asset_content_type: application/x-msdownload

      - name: Upload MSI to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: target/release/bundle/msi/Morn_${{ replace(github.ref_name, 'v', '') }}_x64_en-US.msi
          asset_name: Morn_${{ replace(github.ref_name, 'v', '') }}_x64_en-US.msi
          asset_content_type: application/x-msdownload

      - name: Generate update.json for auto-updater
        if: github.event_name == 'release'
        shell: powershell
        run: |
          $VERSION = "${{ github.event.release.tag_name }}".TrimStart('v')
          $MSI_PATH = Get-ChildItem -Path target/release/bundle/msi/*.msi | Select-Object -First 1
          $SIZE = (Get-Item $MSI_PATH).Length
          $SIGNATURE = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

          $UPDATE_JSON = @{
            version = $VERSION
            notes = "See https://github.com/huangdi97/morn/releases/tag/${{ github.event.release.tag_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $SIGNATURE
                url = "https://github.com/huangdi97/morn/releases/download/${{ github.event.release.tag_name }}/$(Split-Path $MSI_PATH -Leaf)"
              }
            }
          }
          $UPDATE_JSON | ConvertTo-Json | Out-File -FilePath update.json -Encoding utf8

      - name: Upload update.json to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./update.json
          asset_name: update.json
          asset_content_type: application/json
