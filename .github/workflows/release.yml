name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check (lib only)
        run: cargo check -p morn

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        run: npm run build
        working-directory: ./web

      - name: Build Tauri desktop app + NSIS
        working-directory: ./src-tauri
        shell: bash
        run: cargo tauri build --bundles nsis,msi 2>&1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the built bundles - they may be in target/ or src-tauri/target/
          NSIS_FILES=$(find . -path "*/bundle/nsis/*.exe" 2>/dev/null || true)
          MSI_FILES=$(find . -path "*/bundle/msi/*.msi" 2>/dev/null || true)
          echo "Found NSIS: $NSIS_FILES"
          echo "Found MSI: $MSI_FILES"
          if [ -n "$NSIS_FILES" ] || [ -n "$MSI_FILES" ]; then
            gh release create "$TAG" \
              --title "Morn ${TAG#v}" \
              --notes "自动构建 from ${GITHUB_SHA:0:7}" \
              $NSIS_FILES $MSI_FILES
          else
            echo "WARNING: No bundle files found, checking target directories..."
            find . -name "*.exe" -path "*/bundle/*" 2>/dev/null || echo "No .exe found"
            find . -name "*.msi" -path "*/bundle/*" 2>/dev/null || echo "No .msi found"
          fi

      - name: Generate update.json
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $MSI_PATH = Get-ChildItem -Path target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          if (-not $MSI_PATH) {
            $MSI_PATH = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          }
          if ($MSI_PATH) {
            $SIZE = (Get-Item $MSI_PATH).Length
            $UPDATE_JSON = @{
              version = $VERSION
              notes = "See https://github.com/huangdi97/morn/releases/tag/${{ github.ref_name }}"
              pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                "windows-x86_64" = @{
                  signature = ""
                  url = "https://github.com/huangdi97/morn/releases/download/${{ github.ref_name }}/$(Split-Path $MSI_PATH -Leaf)"
                }
              }
            }
            $UPDATE_JSON | ConvertTo-Json | Out-File -FilePath update.json -Encoding utf8
            Write-Host "update.json generated"
          } else {
            Write-Host "No MSI found, skipping update.json"
          }

      - name: Upload update.json to Release
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f update.json ]; then
            gh release upload "${{ github.ref_name }}" update.json
          fi
