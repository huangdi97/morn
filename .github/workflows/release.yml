name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check (lib only)
        run: cargo check -p morn

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build frontend
        run: npm run build
        working-directory: ./web

      - name: Build Tauri desktop app + NSIS
        run: cargo tauri build --bundles nsis,msi
        working-directory: ./src-tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "Morn ${TAG#v}" \
            --notes "自动构建 from ${GITHUB_SHA:0:7}" \
            target/release/bundle/nsis/*.exe target/release/bundle/msi/*.msi

      - name: Generate update.json
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $MSI_PATH = Get-ChildItem -Path target/release/bundle/msi/*.msi | Select-Object -First 1
          $SIZE = (Get-Item $MSI_PATH).Length
          $SIGNATURE = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"

          $UPDATE_JSON = @{
            version = $VERSION
            notes = "See https://github.com/huangdi97/morn/releases/tag/${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $SIGNATURE
                url = "https://github.com/huangdi97/morn/releases/download/${{ github.ref_name }}/$(Split-Path $MSI_PATH -Leaf)"
              }
            }
          }
          $UPDATE_JSON | ConvertTo-Json | Out-File -FilePath update.json -Encoding utf8

      - name: Upload update.json to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" update.json
